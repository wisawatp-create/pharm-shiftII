<div id="register-component" class="w-full flex flex-col items-center gap-6 animate-fade-in">
  
  <div class="w-full flex justify-between items-center px-2">
    <div class="flex items-center gap-2 text-[#004b8d] text-2xl font-bold">
      <i class="fa-solid fa-square-plus text-3xl"></i>
      <span>PharmaLog</span>
    </div>
    <button onclick="navigateTo('login.html')" class="w-8 h-8 bg-slate-100 rounded-full flex items-center justify-center text-slate-500 hover:bg-slate-200 transition-colors">
      <i class="fa-solid fa-arrow-left text-sm"></i>
    </button>
  </div>

  <div class="text-center">
    <h1 class="text-2xl font-bold text-[#004b8d]">ลงทะเบียนผู้ใช้</h1>
    <p class="text-xs text-slate-500 mt-1">กรอกข้อมูลเพื่อสร้างบัญชีผู้ใช้สำหรับระบบบันทึกเวร</p>
  </div>

  <div class="bg-white w-full rounded-2xl p-6 shadow-sm border border-slate-100">
    <form id="registerForm" onsubmit="handleRegister(event)">
      
      <div class="mb-4">
        <label class="block text-sm font-medium mb-1.5 flex items-center gap-1.5 text-slate-600">
          <i class="fa-regular fa-user text-xs"></i> ชื่อ-นามสกุล
        </label>
        <input type="text" id="regFullName" required placeholder="ระบุชื่อจริงและนามสกุล" 
               class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:border-[#004b8d] bg-slate-50/50 text-sm">
      </div>

      <div class="mb-4">
        <label class="block text-sm font-medium mb-1.5 flex items-center gap-1.5 text-slate-600">
          <i class="fa-regular fa-envelope text-xs"></i> อีเมล
        </label>
        <input type="email" id="regEmail" required placeholder="example@pharmalog.com" 
               class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:border-[#004b8d] bg-slate-50/50 text-sm">
      </div>

      <div class="mb-4">
        <label class="block text-sm font-medium mb-1.5 flex items-center gap-1.5 text-slate-600">
          <i class="fa-solid fa-users-gear text-xs"></i> ประเภท
        </label>
        <div class="relative">
          <select id="regRole" required 
                  class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:border-[#004b8d] bg-slate-50/50 text-sm appearance-none cursor-pointer text-slate-700">
            <option value="" disabled selected>เลือกประเภทบุคลากร</option>
            <option value="Pharmacist">เภสัชกร</option>
            <option value="Pharmacy_Technician">เจ้าพนักงานเภสัชกรรม</option>
            <option value="Support_Staff">เจ้าหน้าที่สนับสนุน</option>
          </select>
          <div class="absolute inset-y-0 right-0 flex items-center pr-4 pointer-events-none text-slate-400 text-xs">
            <i class="fa-solid fa-chevron-down"></i>
          </div>
        </div>
      </div>

      <div class="mb-4">
        <label class="block text-sm font-medium mb-1.5 flex items-center gap-1.5 text-slate-600">
          <i class="fa-solid fa-lock text-xs"></i> รหัสผ่าน
        </label>
        <input type="password" id="regPassword" required placeholder="••••••••" minlength="6"
               class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:border-[#004b8d] bg-slate-50/50 text-sm">
      </div>

      <div class="mb-6">
        <label class="block text-sm font-medium mb-1.5 flex items-center gap-1.5 text-slate-600">
          <i class="fa-regular fa-circle-check text-xs"></i> ยืนยันรหัสผ่าน
        </label>
        <input type="password" id="regConfirmPassword" required placeholder="••••••••" minlength="6"
               class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:border-[#004b8d] bg-slate-50/50 text-sm">
      </div>

      <button type="submit" id="regSubmitBtn"
              class="w-full bg-[#004b8d] text-white py-3 rounded-xl font-medium flex items-center justify-center gap-2 hover:bg-[#003d73] transition-colors shadow-sm">
        <span>ลงทะเบียน</span>
        <i class="fa-solid fa-arrow-right"></i>
      </button>
    </form>
  </div>

  <div class="text-center text-sm mt-2">
    <span class="text-slate-500">มีบัญชีอยู่แล้ว?</span>
    <button onclick="navigateTo('login.html')" class="text-[#004b8d] font-bold hover:underline ml-1">เข้าสู่ระบบ</button>
  </div>
</div>
