<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PharmaLog - ระบบจัดการเวร</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Sarabun', sans-serif; background-color: #f4f9f4; }
  </style>
</head>
<body class="min-h-screen flex flex-col justify-between p-4 text-slate-700">

  <div id="app" class="w-full max-w-md mx-auto my-auto">
    <div class="text-center py-8">
      <i class="fa-solid fa-circle-notch animate-spin text-[#004b8d] text-3xl"></i>
      <p class="text-sm text-slate-500 mt-2">กำลังโหลดระบบ...</p>
    </div>
  </div>

  <div class="text-center text-[10px] text-slate-400 mt-6 w-full">
    <p>ระบบปฏิบัติตามข้อกำหนด PharmaLog v2.4.0</p>
    <p>© 2026 PharmaLog Services. การเข้าถึงทั้งหมดจะถูกตรวจสอบ</p>
  </div>

  <script>
    // 🔗 ตั้งค่า URL ของ Standalone GAS Web App และ GitHub Raw Base URL ของคุณ
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxhNm-2mZavM6QAUXENiidiVYJwqw2UjAbRplYo6qIfqEyc3uOH6ZJkFYg9gWvSHGdpkg/exec";
    const GITHUB_RAW_URL = "https://wisawatp-create.github.io/pharm-shiftII/";

    // ตัวแปรส่วนกลางสำหรับจำลอง Session หลัง Login สำเร็จ
    let currentUser = { name: "", role: "" };

    // เรียกทำงานเมื่อโหลดหน้าเว็บครั้งแรก ให้ไปหน้า Login
    window.addEventListener('DOMContentLoaded', () => {
      navigateTo('login.html');
    });

    // ฟังก์ชันหลักในการดึงเนื้อหาจาก GitHub มาเปลี่ยนหน้าจอ
    async function navigateTo(pageName) {
      const appContainer = document.getElementById('app');
      try {
        const response = await fetch(GITHUB_RAW_URL + pageName);
        if (!response.ok) throw new Error("ไม่สามารถโหลดไฟล์คอมโพเนนต์ได้");
        let html = await response.text();
        
        // แทนที่ตัวแปรไดนามิกใน HTML (ถ้ามี เช่น ชื่อพนักงานในหน้าตารางเวร)
        if (pageName === 'schedule.html') {
          html = html.replace('<?= employeeName ?>', currentUser.name)
                     .replace('<?= employeeRole ?>', currentUser.role);
        }

        appContainer.innerHTML = html;
      } catch (error) {
        appContainer.innerHTML = `<div class="text-center text-red-500"><i class="fa-solid fa-triangle-exclamation text-2xl"></i><p class="text-sm mt-2">${error.message}</p></div>`;
      }
    }

    // ----------------------------------------------------
    // ฟังก์ชันจัดการ Event (เมื่อปุ่มในหน้าย่อยต่างๆ ถูกกด)
    // ----------------------------------------------------
    
    // สำหรับหน้า Login (เรียกใช้จากปุ่มใน login.html)
    async function handleLogin(e) {
      e.preventDefault();
      const user = document.getElementById('username').value;
      const pass = document.getElementById('password').value;
      const btn = document.getElementById('submitBtn');
      
      btn.disabled = true;
      btn.innerText = "กำลังตรวจสอบ...";

      try {
        const res = await fetch(GAS_WEB_APP_URL, {
          method: "POST",
          headers: { "Content-Type": "text/plain" },
          body: JSON.stringify({ action: "login", username: user, password: pass })
        });
        const data = await res.json();
        
        if (data.success) {
          currentUser.name = data.employeeName;
          currentUser.role = data.employeeRole;
          navigateTo('schedule.html');
        } else {
          alert(data.message);
          btn.disabled = false;
          btn.innerHTML = `<span>เข้าสู่ระบบ</span> <i class="fa-solid fa-arrow-right-to-bracket"></i>`;
        }
      } catch (err) {
        alert("เชื่อมต่อเซิร์ฟเวอร์ GAS ล้มเหลว");
        btn.disabled = false;
      }
    }

    // สำหรับหน้า Register (เรียกใช้จากปุ่มใน register.html)
    async function handleRegister(e) {
      e.preventDefault();
      const fullName = document.getElementById('regFullName').value;
      const email = document.getElementById('regEmail').value;
      const role = document.getElementById('regRole').value;
      const password = document.getElementById('regPassword').value;
      const confirmPassword = document.getElementById('regConfirmPassword').value;
      const btn = document.getElementById('regSubmitBtn');

      if (password !== confirmPassword) {
        alert("รหัสผ่านไม่ตรงกัน");
        return;
      }

      btn.disabled = true;
      btn.innerText = "กำลังบันทึก...";

      try {
        const res = await fetch(GAS_WEB_APP_URL, {
          method: "POST",
          headers: { "Content-Type": "text/plain" },
          body: JSON.stringify({ action: "register", userData: { fullName, email, role, password } })
        });
        const data = await res.json();
        
        if (data.success) {
          alert(data.message);
          navigateTo('login.html');
        } else {
          alert(data.message);
          btn.disabled = false;
        }
      } catch (err) {
        alert("เกิดข้อผิดพลาดคลาวด์");
        btn.disabled = false;
      }
    }

    function togglePassword() {
      const pwd = document.getElementById('password');
      const icon = document.getElementById('toggleIcon');
      if (pwd.type === 'password') {
        pwd.type = 'text';
        icon.className = 'fa-solid fa-eye-slash';
      } else {
        pwd.type = 'password';
        icon.className = 'fa-solid fa-eye';
      }
    }

    /**
     * ฟังก์ชันสั่งรันระบบปฏิทินที่ดึงมาจากไฟล์ schedule.html
     */
    function initDynamicCalendar() {
      // ตรวจสอบว่ามีฟังก์ชันคำนวณปฏิทินที่ติดมากับสคริปต์ของ schedule.html อยู่จริงหรือไม่
      if (typeof renderCalendar === 'function') {
        // ใช้ตัวแปรเริ่มต้นในหน้าย่อย (ตุลาคม 2569 คือปี 2026 เดือน index 9)
        renderCalendar(currentYear, currentMonth);
      }
    }

    /**
     * ระบบจัดการการเข้าสู่ระบบ (เชื่อม API doPost() ของ Standalone GAS)
     */
    async function handleLogin(e) {
      e.preventDefault();
      const user = document.getElementById('username').value;
      const pass = document.getElementById('password').value;
      const btn = document.getElementById('submitBtn');
      
      btn.disabled = true;
      btn.innerHTML = `<i class="fa-solid fa-circle-notch animate-spin"></i> กำลังตรวจสอบ...`;

      try {
        const res = await fetch(GAS_WEB_APP_URL, {
          method: "POST",
          headers: { "Content-Type": "text/plain" },
          body: JSON.stringify({ action: "login", username: user, password: pass })
        });
        const data = await res.json();
        
        if (data.success) {
          // เก็บข้อมูลที่ได้จากแถวของ Google Sheet ลงในระบบความจำหน้าบ้าน
          currentUser.name = data.employeeName;
          currentUser.role = data.employeeRole;
          
          // เปลี่ยนหน้าเข้าไปยังตารางปฏิบัติงานเวรสำเร็จ 🎉
          navigateTo('schedule.html');
        } else {
          alert(data.message);
          btn.disabled = false;
          btn.innerHTML = `<span>เข้าสู่ระบบ</span> <i class="fa-solid fa-arrow-right-to-bracket"></i>`;
        }
      } catch (err) {
        alert("การเชื่อมโยงระบบคลาวด์ Apps Script ขัดข้อง กรุณาลองใหม่อีกครั้ง");
        btn.disabled = false;
        btn.innerHTML = `<span>เข้าสู่ระบบ</span> <i class="fa-solid fa-arrow-right-to-bracket"></i>`;
      }
    }

    /**
     * ระบบส่งข้อมูลลงทะเบียนบันทึกลง Google Sheet
     */
    async function handleRegister(e) {
      e.preventDefault();
      const fullName = document.getElementById('regFullName').value;
      const email = document.getElementById('regEmail').value;
      const role = document.getElementById('regRole').value;
      const password = document.getElementById('regPassword').value;
      const confirmPassword = document.getElementById('regConfirmPassword').value;
      const btn = document.getElementById('regSubmitBtn');

      if (password !== confirmPassword) {
        alert("รหัสผ่านทั้งสองช่องไม่ตรงกัน!");
        return;
      }

      btn.disabled = true;
      btn.innerHTML = `<i class="fa-solid fa-circle-notch animate-spin"></i> กำลังบันทึก...`;

      try {
        const res = await fetch(GAS_WEB_APP_URL, {
          method: "POST",
          headers: { "Content-Type": "text/plain" },
          body: JSON.stringify({ action: "register", userData: { fullName, email, role, password } })
        });
        const data = await res.json();
        
        if (data.success) {
          alert(data.message);
          navigateTo('login.html'); // สมัครเสร็จสิ้น ส่งกลับไปหน้าล็อกอินเพื่อเข้าใช้งานคราวต่อไป
        } else {
          alert(data.message);
          btn.disabled = false;
          btn.innerHTML = `<span>ลงทะเบียน</span> <i class="fa-solid fa-arrow-right"></i>`;
        }
      } catch (err) {
        alert("เกิดข้อผิดพลาดในการติดต่อฐานข้อมูล");
        btn.disabled = false;
        btn.innerHTML = `<span>ลงทะเบียน</span> <i class="fa-solid fa-arrow-right"></i>`;
      }
    }
    
    function handleLogout() {
      currentUser = { name: "", role: "" };
      navigateTo('login.html');
    }
  </script>
</body>
</html>
