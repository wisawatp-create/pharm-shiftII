<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PharmaLog - ระบบจัดการเวร</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Sarabun', sans-serif; background-color: #f4f9f4; }
  </style>
</head>
<body class="min-h-screen flex flex-col justify-between p-4 text-slate-700">

  <div id="app" class="w-full max-w-md mx-auto my-auto">
    <div class="text-center py-8">
      <i class="fa-solid fa-circle-notch animate-spin text-[#004b8d] text-3xl"></i>
      <p class="text-sm text-slate-500 mt-2">กำลังโหลดระบบ...</p>
    </div>
  </div>

  <div class="text-center text-[10px] text-slate-400 mt-6 w-full">
    <p>ระบบปฏิบัติตามข้อกำหนด PharmaLog v2.4.0</p>
    <p>© 2026 PharmaLog Services. การเข้าถึงทั้งหมดจะถูกตรวจสอบ</p>
  </div>

  <script>
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxSdxNXS1dm0P2MPl6Yu8uX0CJL3vb31dG84EDqqVEgvz7QiopYTuUMl-v6dH6nGllF/exec";
    const GITHUB_RAW_URL = "https://wisawatp-create.github.io/pharm-shiftII/";

    let currentUser = { name: "", role: "" };

    // เปลี่ยนมาผูกเข้ากับ window โดยตรงเพื่อให้ไฟล์อื่นเรียกข้ามไปมาได้
    const now = new Date();
    window.globalMonthsConfig = [
      { year: now.getFullYear(), month: now.getMonth() },
      { year: new Date(now.getFullYear(), now.getMonth() + 1, 1).getFullYear(), month: new Date(now.getFullYear(), now.getMonth() + 1, 1).getMonth() }
    ];
    window.globalThaiMonths = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
    window.globalThaiDaysShort = ["อา.", "จ.", "อ.", "พ.", "พฤ.", "ศ.", "ส."];

    window.addEventListener('DOMContentLoaded', () => {
      navigateTo('login.html');
    });

    async function navigateTo(pageName) {
      const appContainer = document.getElementById('app');
      try {
        const response = await fetch(GITHUB_RAW_URL + pageName);
        if (!response.ok) throw new Error("ไม่สามารถโหลดไฟล์คอมโพเนนต์ได้");
        let html = await response.text();
        
        if (pageName === 'schedule.html') {
          html = html.replace('<?= employeeName ?>', currentUser.name)
                     .replace('<?= employeeRole ?>', currentUser.role);
        }
        
        appContainer.innerHTML = html;

        // 🔥 แก้ไขเรื่องสคริปต์ไม่รัน: ค้นหาแท็กสคริปต์ใน HTML ที่ดึงมาแล้วสร้าง Element ใหม่เพื่อให้มันรันทำงาน
        const scripts = appContainer.querySelectorAll('script');
        scripts.forEach(oldScript => {
          const newScript = document.createElement('script');
          if (oldScript.src) {
            newScript.src = oldScript.src;
          } else {
            newScript.innerHTML = oldScript.innerHTML;
          }
          document.body.appendChild(newScript);
          oldScript.remove(); // ลบสคริปต์เก่าที่ทำงานไม่ได้ออกไป
        });

      } catch (error) {
        appContainer.innerHTML = `<div class="text-center text-red-500"><i class="fa-solid fa-triangle-exclamation text-2xl"></i><p class="text-sm mt-2">${error.message}</p></div>`;
      }
    }

    // ฟังก์ชันจัดการล็อกอิน (ชุดเดียว ไม่ซ้ำซ้อน)
    async function handleLogin(e) {
      e.preventDefault();
      const user = document.getElementById('username').value;
      const pass = document.getElementById('password').value;
      const btn = document.getElementById('submitBtn');
      
      btn.disabled = true;
      btn.innerHTML = `<i class="fa-solid fa-circle-notch animate-spin"></i> กำลังตรวจสอบ...`;

      try {
        const res = await fetch(GAS_WEB_APP_URL, {
          method: "POST",
          headers: { "Content-Type": "text/plain" },
          body: JSON.stringify({ action: "login", username: user, password: pass })
        });
        const data = await res.json();
        
        if (data.success) {
          currentUser.name = data.employeeName;
          currentUser.role = data.employeeRole;
          navigateTo('schedule.html');
        } else {
          alert(data.message);
          btn.disabled = false;
          btn.innerHTML = `<span>เข้าสู่ระบบ</span> <i class="fa-solid fa-arrow-right-to-bracket"></i>`;
        }
      } catch (err) {
        alert("การเชื่อมโยงระบบคลาวด์ Apps Script ขัดข้อง กรุณาลองใหม่อีกครั้ง");
        btn.disabled = false;
        btn.innerHTML = `<span>เข้าสู่ระบบ</span> <i class="fa-solid fa-arrow-right-to-bracket"></i>`;
      }
    }

    // ฟังก์ชันจัดการลงทะเบียน (ชุดเดียว ไม่ซ้ำซ้อน)
    async function handleRegister(e) {
      e.preventDefault();
      const fullName = document.getElementById('regFullName').value;
      const email = document.getElementById('regEmail').value;
      const role = document.getElementById('regRole').value;
      const password = document.getElementById('regPassword').value;
      const confirmPassword = document.getElementById('regConfirmPassword').value;
      const btn = document.getElementById('regSubmitBtn');

      if (password !== confirmPassword) {
        alert("รหัสผ่านทั้งสองช่องไม่ตรงกัน!");
        return;
      }

      btn.disabled = true;
      btn.innerHTML = `<i class="fa-solid fa-circle-notch animate-spin"></i> กำลังบันทึก...`;

      try {
        const res = await fetch(GAS_WEB_APP_URL, {
          method: "POST",
          headers: { "Content-Type": "text/plain" },
          body: JSON.stringify({ action: "register", userData: { fullName, email, role, password } })
        });
        const data = await res.json();
        
        if (data.success) {
          alert(data.message);
          navigateTo('login.html');
        } else {
          alert(data.message);
          btn.disabled = false;
          btn.innerHTML = `<span>ลงทะเบียน</span> <i class="fa-solid fa-arrow-right"></i>`;
        }
      } catch (err) {
        alert("เกิดข้อผิดพลาดในการติดต่อฐานข้อมูล");
        btn.disabled = false;
        btn.innerHTML = `<span>ลงทะเบียน</span> <i class="fa-solid fa-arrow-right"></i>`;
      }
    }
    
    function togglePassword() {
      const pwd = document.getElementById('password');
      const icon = document.getElementById('toggleIcon');
      if (pwd.type === 'password') {
        pwd.type = 'text';
        icon.className = 'fa-solid fa-eye-slash';
      } else {
        pwd.type = 'password';
        icon.className = 'fa-solid fa-eye';
      }
    }

    function handleLogout() {
      currentUser = { name: "", role: "" };
      navigateTo('login.html');
    }
  </script>
</body>
</html>
