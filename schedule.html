<div class="bg-white rounded-3xl p-5 shadow-xs border border-slate-100/80 mb-5 relative overflow-hidden flex justify-between items-center">
  <div class="flex items-center gap-3">
    <div class="w-10 h-10 bg-[#004b8d]/10 text-[#004b8d] rounded-2xl flex items-center justify-center font-bold text-base shadow-inner">
      <i class="fa-solid fa-user-doctor"></i>
    </div>
    <div>
      <h3 id="profile-display-name" class="font-extrabold text-slate-800 text-sm leading-tight"><?= employeeName ?></h3>
      <p id="profile-display-role" class="text-[11px] text-slate-400 font-medium mt-0.5"><i class="fa-solid fa-id-badge text-[10px]"></i> <?= employeeRole ?></p>
    </div>
  </div>
  <button onclick="handleLogout()" class="w-9 h-9 bg-red-50 text-red-500 rounded-xl flex items-center justify-center hover:bg-red-100 hover:text-red-600 transition-colors cursor-pointer shadow-xs">
    <i class="fa-solid fa-arrow-right-from-bracket text-xs"></i>
  </button>
</div>

<div class="grid grid-cols-2 bg-slate-200/50 p-1.5 rounded-2xl mb-5 gap-1.5 border border-slate-200/30">
  <button id="btn-current-month" onclick="selectMonthTab(0)" class="bg-white text-[#004b8d] py-2 rounded-lg shadow-xs transition-all font-bold text-xs cursor-pointer">
    เดือนปัจจุบัน
  </button>
  <button id="btn-next-month" onclick="selectMonthTab(1)" class="text-slate-400 py-2 rounded-lg transition-all hover:text-slate-600 text-xs cursor-pointer">
    เดือนถัดไป
  </button>
</div>

<div class="overflow-x-auto pb-2 mb-4 scrollbar-none" id="duty-type-tabs">
  <div class="flex gap-2 w-max px-0.5">
    <button onclick="changeDutyTypeTab('ชบด')" class="tab-item bg-[#004b8d] text-white px-4 py-1.5 rounded-full shadow-xs whitespace-nowrap text-xs font-semibold transition-all cursor-pointer">ชบด</button>
    <button onclick="changeDutyTypeTab('บ่ายน้อย')" class="tab-item bg-slate-200/60 text-slate-500 px-4 py-1.5 rounded-full whitespace-nowrap text-xs font-semibold transition-all hover:bg-slate-200 cursor-pointer">บ่ายน้อย</button>
    <button onclick="changeDutyTypeTab('SMC')" class="tab-item bg-slate-200/60 text-slate-500 px-4 py-1.5 rounded-full whitespace-nowrap text-xs font-semibold transition-all hover:bg-slate-200 cursor-pointer">SMC</button>
  </div>
</div>

<div class="bg-white rounded-3xl p-5 border border-slate-100 shadow-xs mb-5 relative flex flex-col min-h-[340px]">
  <div id="calendar-loading" class="absolute inset-0 bg-white/70 backdrop-blur-[1px] rounded-3xl flex items-center justify-center z-10 hidden">
    <div class="text-center">
      <i class="fa-solid fa-circle-notch animate-spin text-[#004b8d] text-xl"></i>
      <p class="text-[10px] text-slate-400 mt-1 font-medium">กำลังซิงก์สเปรดชีต...</p>
    </div>
  </div>

  <div id="system-prep-loader" class="absolute inset-0 bg-white rounded-3xl flex flex-col items-center justify-center transition-opacity duration-300 z-20">
    <i class="fa-solid fa-spinner animate-spin text-slate-300 text-2xl"></i>
    <p class="text-[11px] text-slate-400 mt-2">กำลังเตรียมระบบปฏิทิน...</p>
  </div>

  <div class="flex justify-between items-center mb-4">
    <h3 id="calendar-month-title" class="font-extrabold text-slate-800 text-sm">มกราคม 2569</h3>
    <span class="bg-teal-50 text-teal-600 text-[10px] px-2.5 py-1 rounded-lg font-bold border border-teal-100 shadow-2xs"><i class="fa-solid fa-cloud-sun"></i> อัปเดตเรียลไทม์</span>
  </div>

  <div id="toggle-calendar-wrapper" class="my-auto text-center py-4">
    <button onclick="triggerShowCalendar()" class="bg-[#004b8d] hover:bg-[#003d73] text-white text-xs px-5 py-2.5 rounded-xl font-bold shadow-xs transition-colors cursor-pointer">
      <i class="fa-regular fa-calendar-days mr-1.5"></i> แสดงปฏิทินตารางเวร
    </button>
  </div>

  <div id="calendar-content-area" class="hidden flex-col flex-1">
    <div class="grid grid-cols-7 gap-1 text-center text-[10px] font-extrabold text-slate-400 mb-2 border-b border-slate-50 pb-2">
      <div class="text-red-400">อา</div><div>จ</div><div>อ</div><div>พ</div><div>พฤ</div><div>ศ</div><div class="text-indigo-400">ส</div>
    </div>
    <div id="calendar-days-grid" class="grid grid-cols-7 gap-y-3 gap-x-1 text-center text-xs font-medium text-slate-600 flex-1 content-start"></div>
  </div>
</div>

<div class="flex-1 flex flex-col mb-5">
  <div class="flex justify-between items-center mb-3 px-1">
    <h3 id="selected-date-label" class="font-extrabold text-slate-800 text-sm">เลือกวันที่</h3>
    <span class="text-[10px] text-slate-400 font-medium"><i class="fa-solid fa-list-ul"></i> รายชื่อผู้ปฏิบัติงาน</span>
  </div>
  
  <div id="duties-list-container" class="space-y-2.5 flex-1 overflow-y-auto max-h-[220px] pb-4">
    <div class="bg-white rounded-2xl p-4 text-center text-sm text-slate-400 border border-slate-100 shadow-sm">
      กรุณาเลือกวันที่ในปฏิทินเพื่อดูรายชื่อผู้ปฏิบัติงาน
    </div>
  </div>
</div>

<div id="batch-queue-container" class="bg-amber-50 rounded-3xl p-4 border border-amber-200/60 hidden mb-6 animate-fade-in">
  <div class="flex justify-between items-center mb-3">
    <span class="text-xs font-bold text-amber-800"><i class="fa-solid fa-layer-group"></i> รายการรอการบันทึกสู่ระบบคลาวด์ (<span id="batch-count">0</span>)</span>
    <button onclick="clearBatchQueue()" class="text-[11px] text-red-500 font-bold hover:underline">ล้างคิว</button>
  </div>
  <div id="batch-queue-list" class="space-y-2 max-h-[120px] overflow-y-auto text-xs text-slate-600 mb-4"></div>
  <button id="btn-save-batch" onclick="submitBatchChangesToServer()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white text-xs py-2.5 rounded-xl font-bold shadow-md transition-all flex items-center justify-center gap-2 cursor-pointer">
    <i class="fa-solid fa-cloud-arrow-up"></i> ยืนยันบันทึกข้อมูลทั้งหมดลงชีท
  </button>
</div>

<script>
  (() => {
    const monthsConfig = window.globalMonthsConfig || [];
    const thaiMonths = window.globalThaiMonths || [];
    const thaiDaysShort = window.globalThaiDaysShort || [];

    let activeMonthIndex = 0; 
    let selectedDutyType = "ชบด"; 
    let selectedDate = null;
    let serverDuties = {};
    let allStaffList = []; // รายชื่อเจ้าหน้าที่ทั้งหมดในระบบที่ดึงมาจาก Server
    let isCalendarExpanded = false;
    
    // 📦 โครงสร้างเก็บข้อมูล Batch Updates สำหรับรวบรวมส่งทีเดียว
    let batchUpdatesQueue = {}; 

    window.selectMonthTab = selectMonthTab;
    window.changeDutyTypeTab = changeDutyTypeTab;
    window.triggerShowCalendar = triggerShowCalendar;
    window.selectDate = selectDate;
    window.openReplaceModal = openReplaceModal;
    window.clearBatchQueue = clearBatchQueue;
    window.submitBatchChangesToServer = submitBatchChangesToServer;

    console.log("=== สคริปต์ตารางเวรเวอร์ชัน Batch & SweetAlert พร้อมทำงาน ===");
    initComponent();

    function initComponent() {
      const currentConfig = monthsConfig[0];
      const nextConfig = monthsConfig[1];
      
      if (!currentConfig || !nextConfig) {
        console.error("ไม่สามารถดึงข้อมูล Config เดือนจากส่วนกลางได้");
        return;
      }

      document.getElementById('btn-current-month').innerText = `${thaiMonths[currentConfig.month]} ${currentConfig.year + 543}`;
      document.getElementById('btn-next-month').innerText = `${thaiMonths[nextConfig.month]} ${nextConfig.year + 543}`;
      
      const prepLoader = document.getElementById('system-prep-loader');
      if (prepLoader) {
        prepLoader.style.opacity = '0';
        setTimeout(() => prepLoader.classList.add('hidden'), 300);
      }

      const targetTime = monthsConfig[activeMonthIndex];
      document.getElementById('calendar-month-title').innerText = `${thaiMonths[targetTime.month]} ${targetTime.year + 543}`;     
      
      triggerShowCalendar();
    }

    function triggerShowCalendar() {
      isCalendarExpanded = true;
      document.getElementById('toggle-calendar-wrapper').classList.add('hidden');
      document.getElementById('calendar-content-area').classList.remove('hidden');
      document.getElementById('calendar-content-area').classList.add('flex');
      
      const targetTime = monthsConfig[activeMonthIndex];
      renderCalendar(targetTime.year, targetTime.month);
      fetchDutiesFromSheet();
    }

    function selectMonthTab(index) {
      activeMonthIndex = index;
      const btnCurrent = document.getElementById('btn-current-month');
      const btnNext = document.getElementById('btn-next-month');
      
      if (index === 0) {
        btnCurrent.className = "bg-white text-[#004b8d] py-2 rounded-lg shadow-xs transition-all font-bold text-xs cursor-pointer";
        btnNext.className = "text-slate-400 py-2 rounded-lg transition-all hover:text-slate-600 text-xs cursor-pointer";
      } else {
        btnCurrent.className = "text-slate-400 py-2 rounded-lg transition-all hover:text-slate-600 text-xs cursor-pointer";
        btnNext.className = "bg-white text-[#004b8d] py-2 rounded-lg shadow-xs transition-all font-bold text-xs cursor-pointer";
      }
      
      selectedDate = null;
      resetDutyDetailCard();
      
      const targetTime = monthsConfig[activeMonthIndex];
      document.getElementById('calendar-month-title').innerText = `${thaiMonths[targetTime.month]} ${targetTime.year + 543}`;

      if (isCalendarExpanded) {
        renderCalendar(targetTime.year, targetTime.month);
        fetchDutiesFromSheet();
      }
    }

    function changeDutyTypeTab(type) {
      selectedDutyType = type;
      const buttons = document.querySelectorAll('#duty-type-tabs .tab-item');
      buttons.forEach(btn => {
        if (btn.innerText === type) {
          btn.className = "tab-item bg-[#004b8d] text-white px-4 py-1.5 rounded-full shadow-xs whitespace-nowrap text-xs font-semibold transition-all cursor-pointer";
        } else {
          btn.className = "tab-item bg-slate-200/60 text-slate-500 px-4 py-1.5 rounded-full whitespace-nowrap text-xs font-semibold transition-all hover:bg-slate-200 cursor-pointer";
        }
      });
      
      if (isCalendarExpanded) {
        fetchDutiesFromSheet();
      }
    }

    async function fetchDutiesFromSheet() {
      if (!isCalendarExpanded) return;
      
      const loadingEl = document.getElementById('calendar-loading');
      if (loadingEl) loadingEl.classList.remove('hidden');
      const targetTime = monthsConfig[activeMonthIndex];
      
      try {
        console.log("📡 เริ่มต้นดึงข้อมูลตารางเวรและรายชื่อเจ้าหน้าที่ทั้งหมดจากชีท...");
        const response = await fetch(GAS_WEB_APP_URL, {
          method: "POST",
          headers: { "Content-Type": "text/plain" },
          body: JSON.stringify({ 
            action: "getDuties", 
            userRole: currentUser.role,          
            dutyType: selectedDutyType,          
            year: targetTime.year, 
            month: targetTime.month 
          })
        });
        const data = await response.json();
        if (data.success) {
          serverDuties = data.duties;
          
          // 🌟 โดนโหลดและเก็บค่าเข้าตัวแปรส่วนกลางทันทีตั้งแต่เปิดหน้าจอ
          allStaffList = data.allStaff || []; 
          console.log("✅ โหลดรายชื่อสำเร็จจำนวน:", allStaffList.length, "คน", allStaffList);

          renderCalendar(targetTime.year, targetTime.month);
          
          if (selectedDate) {
            const parts = selectedDate.split('-');
            selectDate(parseInt(parts[0]), parseInt(parts[1]), parseInt(parts[2]));
          }
        }
      } catch (err) {
        console.error("การโหลดข้อมูลขัดข้อง:", err);
      } finally {
        if (loadingEl) loadingEl.classList.add('hidden');
      }
    }
    
    function renderCalendar(year, month) {
      const gridContainer = document.getElementById('calendar-days-grid');
      if (!gridContainer || !isCalendarExpanded) return;
      
      gridContainer.innerHTML = "";
      const firstDayIndex = new Date(year, month, 1).getDay();
      const totalDays = new Date(year, month + 1, 0).getDate();
      const prevMonthTotalDays = new Date(year, month, 0).getDate();

      for (let x = firstDayIndex; x > 0; x--) {
        gridContainer.innerHTML += `<div class="text-slate-200 py-1 select-none font-medium">${prevMonthTotalDays - x + 1}</div>`;
      }

      for (let day = 1; day <= totalDays; day++) {
        const dateKey = `${year}-${month}-${day}`;
        const dutiesList = serverDuties[dateKey];
        
        let dotHtml = "";
        let classStyle = "py-1 cursor-pointer rounded-xl hover:bg-slate-100 transition-colors relative font-semibold";

        if (dutiesList && dutiesList.length > 0) {
          dotHtml = `<span class="absolute bottom-0 left-1/2 -translate-x-1/2 w-1 h-1 ${dutiesList[0].color || 'bg-slate-400'} rounded-full"></span>`;
        }

        if (selectedDate === dateKey) {
          classStyle = "bg-[#004b8d] text-white rounded-xl py-1 shadow-sm font-bold cursor-pointer relative";
          dotHtml = "";
        }

        gridContainer.innerHTML += `
          <div class="${classStyle}" onclick="selectDate(${year}, ${month}, ${day})">
            ${day}
            ${dotHtml}
          </div>`;
      }

      const totalCells = firstDayIndex + totalDays;
      const remainingCells = (7 - (totalCells % 7)) % 7;
      for (let i = 1; i <= remainingCells; i++) {
        gridContainer.innerHTML += `<div class="text-slate-200 py-1 select-none font-medium">${i}</div>`;
      }
    }

    function selectDate(year, month, day) {
      const dateKey = `${year}-${month}-${day}`;
      selectedDate = dateKey;
      renderCalendar(year, month);
      document.getElementById('selected-date-label').innerText = `${day} ${thaiMonths[month]} ${year + 543}`;

      const dutiesList = serverDuties[dateKey] || [];
      const container = document.getElementById('duties-list-container');
      if (!container) return;
      container.innerHTML = "";

      if (dutiesList.length === 0) {
        container.innerHTML = `
          <div class="bg-white rounded-2xl p-4 text-center text-sm text-slate-400 border border-slate-100 shadow-sm">
            ไม่มีภาระงานเวร ${selectedDutyType} ในวันนี้
          </div>`;
        return;
      }

      dutiesList.forEach((duty, subIndex) => {
        // 📦 ตรวจสอบว่าใน Batch Queue มีคิวแก้ไขของรายการนี้อยู่ก่อนหน้านี้หรือยัง เพื่อนำมาแสดงผลแบบ Realtime บน UI
        const batchKey = `${dateKey}_${selectedDutyType}_${subIndex}`;
        const activeDutyUser = batchUpdatesQueue[batchKey] ? batchUpdatesQueue[batchKey].replaceUser : (duty.isAvailable ? "ยังไม่มีผู้แทน" : duty.replaceUser);
        const isQueued = batchUpdatesQueue[batchKey] ? true : false;

        // 🌟 ปรับปรุงข้อกำหนดข้อที่ 2: เพิ่มปุ่ม "ลงชื่อแทน" ให้แสดงในทุกรายการ เพื่อเปิดสิทธิ์ให้แก้ไขต่อไปได้เรื่อยๆ
        let replaceInfoHtml = `
          <div class="text-right flex flex-col items-end gap-1.5">
            ${duty.isAvailable && !isQueued ? 
              `<span class="text-[10px] text-amber-600 bg-amber-50 px-2 py-0.5 rounded-md font-medium border border-amber-100">เวรว่าง</span>` : 
              `<div class="text-right">
                <p class="text-[9px] text-slate-400 font-medium">ผู้ปฏิบัติงานแทน</p>
                <p class="text-xs font-bold ${isQueued ? 'text-amber-500' : 'text-teal-600'}">${activeDutyUser}</p>
               </div>`
            }
            <button onclick="openReplaceModal('${dateKey}', '${duty.approvedUser || ''}', ${subIndex})" class="bg-[#004b8d] hover:bg-[#003d73] text-white text-[10px] px-2.5 py-1 rounded-lg font-bold shadow-2xs transition-colors cursor-pointer">
              <i class="fa-solid fa-user-pen"></i> ลงชื่อแทน
            </button>
          </div>`;

        const borderBadgeColor = duty.badge === 'ชบด' ? 'border-l-[#004b8d]' : duty.badge === 'บ่าย' ? 'border-l-teal-500' : 'border-l-red-500';

        container.innerHTML += `
          <div class="bg-white rounded-2xl p-3 border-l-4 ${borderBadgeColor} shadow-sm border border-slate-100 flex justify-between items-center ${isQueued ? 'bg-amber-50/40 ring-1 ring-amber-200' : ''}">
            <div class="flex items-center gap-3">
              <div class="bg-slate-50 rounded-xl px-2.5 py-1.5 text-center border border-slate-100">
                <p class="text-[9px] text-slate-400 font-bold">${thaiDaysShort[new Date(year, month, day).getDay()]}</p>
                <p class="text-base font-extrabold text-slate-700 leading-none">${day < 10 ? '0'+day : day}</p>
              </div>
              <div>
                <h4 class="font-bold text-slate-800 text-sm">${duty.approvedUser || "ไม่ระบุต้นเวร"}</h4>
                <p class="text-[11px] text-slate-400 font-medium"><i class="fa-regular fa-clock text-[10px]"></i> ${duty.time}</p>
              </div>
            </div>
            <div>
              ${replaceInfoHtml}
            </div>
          </div>`;
      });
    }

    function openReplaceModal(dateKey, approvedUser, subIndex) {
      // 1. ค้นหาชื่อผู้ปฏิบัติงานแทนปัจจุบัน (เช็กจากคิว Batch ก่อน ถ้าไม่มีให้ใช้จาก Server)
      const batchKey = `${dateKey}_${selectedDutyType}_${subIndex}`;
      let currentActiveUser = "";
    
      if (batchUpdatesQueue[batchKey]) {
        currentActiveUser = batchUpdatesQueue[batchKey].replaceUser;
      } else {
        const originalDuty = serverDuties[dateKey] ? serverDuties[dateKey][subIndex] : null;
        if (originalDuty && !originalDuty.isAvailable) {
          currentActiveUser = originalDuty.replaceUser;
        }
      }
    
      // 2. เตรียมโครงสร้าง HTML Options ของ Dropdown Select
      let selectOptionsHtml = `<option value="" disabled selected>-- เลือกรายชื่อผู้ขึ้นแทน --</option>`;
    
      // 3. 🎯 บริหารจัดการเงื่อนไขการแสดงผลตัวเลือก
      // กรณี ก: ไม่มีรายชื่อต้นเวร (approvedUser ว่างเปล่า) ให้พ่นรายชื่อเจ้าหน้าที่ทั้งหมดออกมาเลย
      if (!approvedUser || approvedUser.trim() === "" || approvedUser === "ไม่ระบุต้นเวร") {
        allStaffList.forEach(staffName => {
          selectOptionsHtml += `<option value="${staffName}">${staffName}</option>`;
        });
      } 
      // กรณี ข: มีรายชื่อต้นเวรอยู่แล้ว
      else {
        // เพิ่มตัวเลือกพิเศษ "**ขึ้นปฏิบัติงานเอง**" ไว้ที่บรรทัดบนสุด
        selectOptionsHtml += `<option value="ขึ้นปฏิบัติงานเอง" class="font-bold text-emerald-600">➔ **ขึ้นปฏิบัติงานเอง**</option>`;
        
        // กรองรายชื่อทั้งหมดโดย "ห้ามซ้ำกับชื่อเจ้าหน้าที่ต้นเวร (approvedUser)"
        let filteredStaff = allStaffList.filter(name => name !== approvedUser);
        
        filteredStaff.forEach(staffName => {
          const isCurrentReplace = (staffName === currentActiveUser) ? " (เลือกอยู่ปัจจุบัน)" : "";
          selectOptionsHtml += `<option value="${staffName}" ${staffName === currentActiveUser ? 'selected' : ''}>${staffName}${isCurrentReplace}</option>`;
        });
      }
    
      const displayDateParts = dateKey.split('-');
      const formattedThaiDate = `${displayDateParts[2]} ${thaiMonths[parseInt(displayDateParts[1])]} ${parseInt(displayDateParts[0]) + 543}`;
    
      // 4. 🎉 เปิดหน้าต่าง Modal ตัวจริงขึ้นมาแสดงผลทันทีแบบไม่มีดีเลย์
      Swal.fire({
        title: '<span class="text-sm font-extrabold text-slate-700">จัดสรรผู้ปฏิบัติงานแทน</span>',
        html: `
          <div class="text-left text-xs text-slate-500 space-y-2 p-1">
            <p><b>วันที่ปฏิบัติงาน:</b> ${formattedThaiDate}</p>
            <p><b>เจ้าหน้าที่ต้นเวร:</b> <span class="text-slate-800 font-bold">${approvedUser || "ไม่มีรายชื่อต้นเวร (แสดงรายชื่อทั้งหมด)"}</span></p>
            ${currentActiveUser ? `<p><b>ผู้ขึ้นแทนปัจจุบัน:</b> <span class="text-amber-600 font-bold">${currentActiveUser}</span></p>` : ''}
            <label class="block mt-4 mb-1 font-bold text-slate-700">เลือกผู้รับผิดชอบเวรแทนคนใหม่:</label>
            <select id="swal-select-replace-user" class="w-full bg-white border border-slate-200 rounded-xl px-3 py-2 text-xs focus:outline-hidden focus:ring-2 focus:ring-[#004b8d]">
              ${selectOptionsHtml}
            </select>
          </div>
        `,
        showCancelButton: true,
        confirmButtonText: 'เพิ่มเข้าคิวบันทึก',
        cancelButtonText: 'ยกเลิก',
        confirmButtonColor: '#004b8d',
        cancelButtonColor: '#64748b',
        customClass: {
          popup: 'rounded-3xl',
          confirmButton: 'rounded-xl text-xs px-4 py-2 font-bold',
          cancelButton: 'rounded-xl text-xs px-4 py-2 font-bold'
        },
        preConfirm: () => {
          const selectedVal = document.getElementById('swal-select-replace-user').value;
          if (!selectedVal) {
            Swal.showValidationMessage('กรุณาเลือกรายชื่อผู้ปฏิบัติงานแทนก่อนกดยืนยัน');
          }
          return selectedVal;
        }
      }).then((result) => {
        if (result.isConfirmed) {
          batchUpdatesQueue[batchKey] = {
            dateKey: dateKey,
            dutyType: selectedDutyType,
            subIndex: subIndex,
            approvedUser: approvedUser,
            replaceUser: result.value
          };
          
          updateBatchQueueUI();
          
          const parts = dateKey.split('-');
          selectDate(parseInt(parts[0]), parseInt(parts[1]), parseInt(parts[2]));
          
          Swal.fire({
            icon: 'success',
            title: 'เพิ่มเข้าคิวสำเร็จ',
            text: 'รายการอัปเดตถูกพักไว้ในคิวแล้ว อย่าลืมกดปุ่ม "ยืนยันบันทึกข้อมูลทั้งหมดลงชีท" ด้านล่างหน้าจอเมื่อเลือกเสร็จสิ้น',
            timer: 2000,
            showConfirmButton: false,
            customClass: { popup: 'rounded-2xl' }
          });
        }
      });
    }
    
    // ฟังก์ชันจัดการแสดงผลบล็อกข้อมูลคิวรอการบันทึก (Batch Queue UI Manager)
    function updateBatchQueueUI() {
      const queueContainer = document.getElementById('batch-queue-container');
      const queueList = document.getElementById('batch-queue-list');
      const queueCount = document.getElementById('batch-count');
      
      const keys = Object.keys(batchUpdatesQueue);
      queueCount.innerText = keys.length;
      
      if (keys.length === 0) {
        queueContainer.classList.add('hidden');
        return;
      }
      
      queueList.innerHTML = "";
      keys.forEach(key => {
        const item = batchUpdatesQueue[key];
        const parts = item.dateKey.split('-');
        const thaiDateShort = `${parts[2]} ${thaiMonths[parseInt(parts[1])].substring(0, 6)}`;
        
        queueList.innerHTML += `
          <div class="flex justify-between items-center bg-white p-2 rounded-xl border border-amber-100 shadow-3xs animate-fade-in">
            <div>
              <span class="font-bold text-[#004b8d]">[${item.dutyType}]</span> วันที่ ${thaiDateShort}: 
              <span class="text-slate-400">${item.approvedUser}</span> ➔ <span class="text-emerald-600 font-bold">${item.replaceUser}</span>
            </div>
            <button onclick="removeSingleItemFromQueue('${key}')" class="text-red-400 hover:text-red-600 px-1"><i class="fa-solid fa-trash-can"></i></button>
          </div>`;
      });
      
      queueContainer.classList.remove('hidden');
    }

    window.removeSingleItemFromQueue = function(key) {
      const item = batchUpdatesQueue[key];
      delete batchUpdatesQueue[key];
      updateBatchQueueUI();
      
      if (selectedDate && item) {
        const parts = item.dateKey.split('-');
        selectDate(parseInt(parts[0]), parseInt(parts[1]), parseInt(parts[2]));
      }
    };

    function clearBatchQueue() {
      batchUpdatesQueue = {};
      updateBatchQueueUI();
      if (selectedDate) {
        const parts = selectedDate.split('-');
        selectDate(parseInt(parts[0]), parseInt(parts[1]), parseInt(parts[2]));
      }
    }

    // 📦 ส่งข้อมูลการแก้ไขทั้งหมดแบบมัดรวม (Batch) ไปอัปเดตลงชีทครั้งเดียว
    async function submitBatchChangesToServer() {
      const keys = Object.keys(batchUpdatesQueue);
      if (keys.length === 0) return;

      const btn = document.getElementById('btn-save-batch');
      btn.disabled = true;
      btn.innerHTML = `<i class="fa-solid fa-circle-notch animate-spin"></i> กำลังอัปเดตฐานข้อมูลสเปรดชีต...`;

      // แปลงข้อมูล Object Queue ให้เป็นรูปแบบ Array ส่งออก
      const payloadData = keys.map(key => batchUpdatesQueue[key]);

      try {
        const response = await fetch(GAS_WEB_APP_URL, {
          method: "POST",
          headers: { "Content-Type": "text/plain" },
          body: JSON.stringify({
            action: "saveBatchDuties",
            updatedBy: currentUser.name,
            batchList: payloadData
          })
        });
        
        const resData = await response.json();
        if (resData.success) {
          Swal.fire({
            icon: 'success',
            title: 'บันทึกข้อมูลเรียบร้อย!',
            text: `แก้ไขข้อมูลตารางเวรลงสเปรดชีตสำเร็จทั้งหมด ${payloadData.length} รายการ`,
            customClass: { popup: 'rounded-2xl' }
          });
          
          batchUpdatesQueue = {}; // ล้างข้อมูลคิวหลังเซฟสำเร็จ
          updateBatchQueueUI();
          fetchDutiesFromSheet(); // โหลดข้อมูลสดๆ ใหม่จาก Google Sheet มาวาดหน้าปฏิทินใหม่
        } else {
          throw new Error(resData.message || "เซิร์ฟเวอร์ปฏิเสธการบันทึก");
        }
      } catch (err) {
        Swal.fire({
          icon: 'error',
          title: 'เกิดข้อผิดพลาดในการบันทึก',
          text: err.message || 'ไม่สามารถเชื่อมต่อคลาวด์ Apps Script ได้ กรุณาลองใหม่อีกครั้ง',
          customClass: { popup: 'rounded-2xl' }
        });
      } finally {
        btn.disabled = false;
        btn.innerHTML = `<i class="fa-solid fa-cloud-arrow-up"></i> ยืนยันบันทึกข้อมูลทั้งหมดลงชีท`;
      }
    }

    function resetDutyDetailCard() {
      document.getElementById('selected-date-label').innerText = "เลือกวันที่";
      const container = document.getElementById('duties-list-container');
      if (container) {
        container.innerHTML = `
          <div class="bg-white rounded-2xl p-4 text-center text-sm text-slate-400 border border-slate-100 shadow-sm">
            กรุณาเลือกวันที่ในปฏิทินเพื่อดูรายชื่อผู้ปฏิบัติงาน
          </div>`;
      }
    }
  })();
</script>
